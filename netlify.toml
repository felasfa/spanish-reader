[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = []

[functions."gmail-import"]
  timeout = 26
  schedule = "0 8 * * *"

# Route /api/* to the corresponding Netlify Function
[[redirects]]
  from = "/api/fetch"
  to   = "/.netlify/functions/fetch-url"
  status = 200

[[redirects]]
  from = "/api/translate"
  to   = "/.netlify/functions/translate"
  status = 200

[[redirects]]
  from = "/api/vocabulary"
  to   = "/.netlify/functions/vocabulary"
  status = 200

[[redirects]]
  from = "/api/vocabulary/*"
  to   = "/.netlify/functions/vocabulary"
  status = 200

[[redirects]]
  from = "/api/reading-list"
  to   = "/.netlify/functions/reading-list"
  status = 200

[[redirects]]
  from = "/api/reading-list/*"
  to   = "/.netlify/functions/reading-list"
  status = 200

[[redirects]]
  from = "/api/gmail-import"
  to   = "/.netlify/functions/gmail-import"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
